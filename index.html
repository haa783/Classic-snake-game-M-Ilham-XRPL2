<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Snake - UKK Project</title>
    <link rel="stylesheet" href="snake.css">
</head>
<body>
    <h1>Classic Snake</h1>

    <script src="snake.js"></script>
